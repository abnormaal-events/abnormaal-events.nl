  <article className="legal-page">
    <div className="shell legal-shell">
      <div className="legal-eyebrow">
        <span className="num squid accent-squid">§</span>
        <span>LEGAL</span>
      </div>
      <h1 className="legal-title">Privacy Policy</h1>
      <p className="legal-meta">Last updated: 1 May 2026 · ABNØRMAAL Events B.V.</p>

      <section>
        <h2>1. Introduction</h2>
        <p>ABNØRMAAL Events B.V. (hereinafter: 'the Organization', 'we', or 'us') values the privacy of its visitors, customers, and other stakeholders. This Privacy Policy explains how we collect, use, store, and protect your personal data in connection with our events and digital channels.</p>
        <p>This policy is in accordance with the General Data Protection Regulation (GDPR / AVG) and the Dutch Implementation Act on the GDPR (UAVG). The Organization acts as the data controller (verwerkingsverantwoordelijke) for the purposes described in this policy.</p>
        <div className="legal-card">
          <strong>ABNØRMAAL Events B.V.</strong>
          <span>Sperwerlaan 30, 7331TX Apeldoorn, The Netherlands</span>
          <span>KvK-number: 42042420</span>
          <span>E-mail: <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a></span>
          <span>Website: <a href="https://www.abnormaal-events.nl">www.abnormaal-events.nl</a></span>
        </div>
      </section>

      <section>
        <h2>2. Personal Data We Collect</h2>
        <p>We may collect and process the following categories of personal data:</p>

        <h3>2.1 Data collected via the ticketing platform (Celebtratix)</h3>
        <ul>
          <li>Full name</li>
          <li>Date of birth</li>
          <li>Email address</li>
          <li>Payment information (processed and stored by Celebtratix; not retained by the Organization)</li>
          <li>Ticket purchase history</li>
        </ul>

        <h3>2.2 Data collected via our website and newsletter</h3>
        <ul>
          <li>Email address (newsletter subscription)</li>
          <li>IP address and browsing behaviour (via cookies; see Article 8)</li>
          <li>Contact form submissions (name, email, message)</li>
        </ul>

        <h3>2.3 Data collected on-site</h3>
        <ul>
          <li>Identification data verified at entry (not retained)</li>
          <li>Incident records (in the event of a security or medical incident)</li>
          <li>Visual material: photos and videos taken during the event (see Article 6)</li>
        </ul>
      </section>

      <section>
        <h2>3. Purposes of Processing and Legal Basis</h2>
        <p>We process personal data only for specified and legitimate purposes. The table below sets out each purpose and its legal basis under the GDPR:</p>
        <table className="legal-table">
          <thead>
            <tr><th>Purpose</th><th>Legal basis</th></tr>
          </thead>
          <tbody>
            <tr><td>Ticket administration and event access</td><td>Performance of contract — Art. 6(1)(b) GDPR</td></tr>
            <tr><td>Communication regarding the event</td><td>Performance of contract — Art. 6(1)(b) GDPR</td></tr>
            <tr><td>Age verification at entry</td><td>Legal obligation — Art. 6(1)(c) GDPR</td></tr>
            <tr><td>Newsletter and marketing communications</td><td>Consent — Art. 6(1)(a) GDPR</td></tr>
            <tr><td>Promotional use of visual material</td><td>Consent / Legitimate interest — Art. 6(1)(a) / (f)</td></tr>
            <tr><td>Security and incident management</td><td>Legitimate interest — Art. 6(1)(f) GDPR</td></tr>
            <tr><td>Compliance with legal obligations</td><td>Legal obligation — Art. 6(1)(c) GDPR</td></tr>
            <tr><td>Website analytics</td><td>Consent — Art. 6(1)(a) GDPR</td></tr>
          </tbody>
        </table>
      </section>

      <section>
        <h2>4. Newsletter and Marketing Communications</h2>
        <p>With your prior consent, we may use your email address to send newsletters and announcements about future ABNØRMAAL Events. You may withdraw your consent at any time by:</p>
        <ul>
          <li>Clicking the unsubscribe link in any marketing email, or</li>
          <li>Sending a request to <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a></li>
        </ul>
        <p>Withdrawal of consent does not affect the lawfulness of processing prior to the withdrawal.</p>
      </section>

      <section>
        <h2>5. Retention Periods</h2>
        <p>We retain personal data only for as long as necessary for the purpose for which it was collected, or as required by applicable law:</p>
        <ul>
          <li>Ticketing and event administration data: up to 2 years after the event</li>
          <li>Financial records: 7 years (statutory Dutch tax retention requirement)</li>
          <li>Newsletter subscriber data: until consent is withdrawn</li>
          <li>Incident records: up to 1 year after the event, unless legally required to retain longer</li>
          <li>Website analytics data: up to 13 months</li>
        </ul>
        <p>After the applicable retention period, personal data will be securely deleted or anonymized.</p>
      </section>

      <section>
        <h2>6. Photography and Videography</h2>
        <h3>6.1 Consent upon attendance</h3>
        <p>By attending an event organized by ABNØRMAAL Events B.V., visitors consent to being photographed, filmed, and recorded (audio and visual). This material may be used for promotional, marketing, and social media purposes, both during and after the event, without compensation.</p>
        <h3>6.2 Objection</h3>
        <p>Visitors who object to the use of their image in promotional material are invited to contact us prior to the event at <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a>. We will make all reasonable efforts to accommodate such requests. However, due to the public and large-scale nature of our events, we cannot guarantee complete exclusion from all visual material.</p>
        <p>After the event, if you identify yourself in published material and wish to have it removed, you may submit a removal request to <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a> with a clear description and/or link to the relevant content.</p>
      </section>

      <section>
        <h2>7. Sharing of Personal Data with Third Parties</h2>
        <h3>7.1 Service providers</h3>
        <p>We may share personal data with third-party service providers who assist in the execution of our events. This includes:</p>
        <ul>
          <li>Celebtratix (ticketing platform)</li>
          <li>Security companies</li>
          <li>Payment processors</li>
          <li>Email marketing platforms</li>
          <li>Web hosting and analytics providers</li>
        </ul>
        <p>These parties process personal data on our behalf and are bound by a Data Processing Agreement (verwerkersovereenkomst) guaranteeing the security and confidentiality of your data.</p>
        <h3>7.2 No sale of data</h3>
        <p>We will never sell, rent, or otherwise commercially share your personal data with third parties for their own marketing purposes.</p>
        <h3>7.3 Legal disclosure</h3>
        <p>We may disclose personal data to competent authorities if required to do so by law, court order, or in connection with legal proceedings.</p>
      </section>

      <section>
        <h2>8. Cookies and Tracking Pixels</h2>
        <p>Our website (<a href="https://www.abnormaal-events.nl">www.abnormaal-events.nl</a>) uses cookies and similar tracking technologies to improve user experience, measure traffic, and understand how visitors find us. We group these into three categories:</p>
        <ul>
          <li><strong>Essential cookies:</strong> necessary for the operation of the website. These cannot be disabled.</li>
          <li><strong>Analytics cookies:</strong> used to measure website traffic and visitor behaviour. Only placed with your consent.</li>
          <li><strong>Marketing cookies:</strong> used to track which campaigns and ads brought you here. Only placed with your explicit consent.</li>
        </ul>

        <h3>8.1 Services we use</h3>
        <table className="legal-table">
          <thead>
            <tr><th>Service</th><th>Category</th><th>What it tracks</th></tr>
          </thead>
          <tbody>
            <tr><td>Google Tag Manager (GTM)</td><td>Container / Analytics</td><td>Loads and orchestrates other tags. Itself only collects technical data needed to deliver tags.</td></tr>
            <tr><td>Meta (Facebook) Pixel</td><td>Marketing</td><td>Page views, clicks on ticket and pre-register buttons, and lead conversions — used to measure the performance of our Meta ads.</td></tr>
            <tr><td>TikTok Pixel</td><td>Marketing</td><td>Page views, clicks on ticket and pre-register buttons, and form submissions — used to measure the performance of our TikTok ads.</td></tr>
          </tbody>
        </table>

        <h3>8.2 Retention</h3>
        <ul>
          <li>Analytics data: up to 13 months.</li>
          <li>Meta Pixel data: retained by Meta according to its own policy, typically up to 2 years.</li>
          <li>TikTok Pixel data: retained by TikTok according to its own policy, typically up to 1 year.</li>
          <li>Your local consent choice is stored in your browser (localStorage) until you change it or clear your browser data.</li>
        </ul>

        <h3>8.3 Managing your consent</h3>
        <p>You can change or withdraw your consent at any time by clicking the <a href="#" data-cookie-settings>Cookie settings</a> link in the footer of every page. Withdrawing consent stops further tracking; data already collected will be retained according to the periods listed above. You can also clear your browser cookies and localStorage to fully reset your consent state.</p>
      </section>

      <section>
        <h2>9. Security of Personal Data</h2>
        <p>The Organization takes appropriate technical and organizational measures to protect personal data against unauthorized access, loss, alteration, or misuse. These measures include, among others, encryption of data in transit, access controls, and regular security assessments. In the event of a data breach that poses a risk to your rights and freedoms, we will notify the Dutch Data Protection Authority (Autoriteit Persoonsgegevens) and, where required, affected individuals without undue delay.</p>
      </section>

      <section>
        <h2>10. Your Rights under the GDPR</h2>
        <p>As a data subject, you have the following rights with respect to your personal data:</p>
        <ul>
          <li><strong>Right of access:</strong> you have the right to request a copy of the personal data we hold about you.</li>
          <li><strong>Right to rectification:</strong> you have the right to request correction of inaccurate or incomplete data.</li>
          <li><strong>Right to erasure ('right to be forgotten'):</strong> you may request deletion of your personal data, subject to legal retention obligations.</li>
          <li><strong>Right to restriction of processing:</strong> you may request that we limit the processing of your data in certain circumstances.</li>
          <li><strong>Right to data portability:</strong> you have the right to receive your data in a structured, machine-readable format.</li>
          <li><strong>Right to object:</strong> you may object to processing based on legitimate interest, including direct marketing.</li>
          <li><strong>Right to withdraw consent:</strong> where processing is based on consent, you may withdraw it at any time without affecting prior processing.</li>
        </ul>
        <p>To exercise any of these rights, please contact us at <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a>. We will respond within 30 days. We may ask you to verify your identity before processing your request.</p>
      </section>

      <section>
        <h2>11. Complaints</h2>
        <p>If you have a complaint about how we handle your personal data, we ask you to contact us first via <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a>. If your complaint is not resolved to your satisfaction, you have the right to lodge a complaint with the Dutch Data Protection Authority:</p>
        <div className="legal-card">
          <strong>Autoriteit Persoonsgegevens</strong>
          <span>Postbus 93374, 2509 AJ Den Haag</span>
          <span><a href="https://www.autoriteitpersoonsgegevens.nl">www.autoriteitpersoonsgegevens.nl</a></span>
        </div>
      </section>

      <section>
        <h2>12. Changes to This Privacy Policy</h2>
        <p>We reserve the right to update this Privacy Policy at any time. Any significant changes will be communicated via our website. The most current version is always available at <a href="https://www.abnormaal-events.nl">www.abnormaal-events.nl</a>. The date of the most recent revision is stated at the top of this document.</p>
      </section>

      <section>
        <h2>13. Contact</h2>
        <p>For any questions, requests, or concerns regarding this Privacy Policy, please contact us:</p>
        <div className="legal-card">
          <strong>ABNØRMAAL Events B.V.</strong>
          <span>Sperwerlaan 30, 7331TX Apeldoorn</span>
          <span>E-mail: <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a></span>
          <span>Website: <a href="https://www.abnormaal-events.nl">www.abnormaal-events.nl</a></span>
        </div>
      </section>
    </div>
  </article>
);
