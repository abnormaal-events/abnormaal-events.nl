  <article className="legal-page">
    <div className="shell legal-shell">
      <div className="legal-eyebrow">
        <span className="num squid accent-squid">§</span>
        <span>LEGAL</span>
      </div>
      <h1 className="legal-title">Terms &amp; Conditions</h1>
      <p className="legal-meta">Last updated: 1 May 2026 · ABNØRMAAL Events B.V.</p>

      <section>
        <h2>1. Organization Details</h2>
        <p>These Terms &amp; Conditions are issued by:</p>
        <div className="legal-card">
          <strong>ABNØRMAAL Events B.V.</strong>
          <span>Sperwerlaan 30, 7331TX Apeldoorn, The Netherlands</span>
          <span>KvK-number: 42042420</span>
          <span>Vestigingsnummer: 000065454820</span>
          <span>E-mail: <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a></span>
          <span>Website: <a href="https://www.abnormaal-events.nl">www.abnormaal-events.nl</a></span>
          <span>Instagram: <a href="https://instagram.com/abnormaal.events">@abnormaal.events</a></span>
        </div>
      </section>

      <section>
        <h2>2. Applicability and Acceptance</h2>
        <p>By purchasing a ticket for any event organized by ABNØRMAAL Events B.V. (hereinafter: 'the Organization'), each visitor, supplier, artist, and staff member accepts these Terms &amp; Conditions and the additional House Rules in full. These terms are always available on the official website and will be available on-site at the event. The Organization reserves the right to amend these terms at any time; the version applicable at the time of ticket purchase is binding.</p>
      </section>

      <section>
        <h2>3. Minimum Age &amp; Identification</h2>
        <p>Entry to the event is permitted only to persons aged 18 years and older. In the event of doubt, valid proof of identity will be requested. Accepted forms of identification are:</p>
        <ul>
          <li>A valid passport</li>
          <li>A valid European identity card</li>
          <li>A valid Dutch driver's license</li>
        </ul>
        <p>If no valid identification can be shown, entry will be refused without the right to a refund. Age verification may also take place at points of alcohol sale on the premises, in accordance with the Dutch Licensing and Catering Act (Drank- en Horecawet).</p>
      </section>

      <section>
        <h2>4. Tickets, Admission Prices &amp; Anti-Scalping</h2>
        <h3>4.1 Personal Tickets via Celebtratix</h3>
        <p>All tickets are issued personally to the buyer and are linked to their Celebtratix account. Tickets may only be purchased, managed, or resold through the official Celebtratix platform. Any attempt to sell, transfer, or purchase tickets outside of Celebtratix is strictly prohibited and may result in cancellation of the ticket without refund.</p>
        <p>Tickets are non-transferable except through the Celebtratix in-app resale feature, which ensures secure change of ownership. The Organization accepts no responsibility for tickets obtained outside the official platform. Lost, stolen, or deleted tickets cannot be reissued.</p>
        <h3>4.2 Ticket Prices</h3>
        <p>Ticket prices range from €44.95 to €59.95 (excl. service fees). Service fees are charged by Celebtratix and are stated separately during the purchase process.</p>
        <h3>4.3 Anti-Scalping</h3>
        <p>Resale of tickets is only permitted through the official Celebtratix resale feature and strictly at a maximum of the original purchase price (excl. service fees). Any resale at a price exceeding the original purchase price is prohibited and will result in cancellation of the ticket without refund. This policy is in line with applicable Dutch consumer protection legislation.</p>
      </section>

      <section>
        <h2>5. Refund Policy</h2>
        <p>Tickets are non-refundable. A refund of the ticket price is only provided in the event of a full cancellation of the event by the Organization. In all other cases — including partial cancellation, program changes, or personal circumstances — no refund or compensation will be issued.</p>
        <p>In the event of cancellation due to force majeure (see Article 8), the visitor has no right to a refund of the ticket price, unless the Organization decides otherwise in writing.</p>
      </section>

      <section>
        <h2>6. Program Changes</h2>
        <p>The Organization reserves the right to change the program at any time and without prior notice, including but not limited to changes to the line-up, timetable, stages, and running order. Such changes do not entitle visitors to a refund, compensation, or any other form of remedy.</p>
      </section>

      <section>
        <h2>7. Right of Admission</h2>
        <p>The Organization expressly reserves the right to refuse or revoke admission to any person at any time, without being obliged to state reasons, and without the right to a refund. This right applies both at the point of entry and after admission has been granted.</p>
        <p>In addition, the Organization has the right to remove any visitor from the premises at any time for any reason it deems sufficient, including but not limited to:</p>
        <ul>
          <li>Violation of these Terms &amp; Conditions or the House Rules</li>
          <li>Aggressive, threatening, or antisocial behaviour</li>
          <li>Possession or use of prohibited items or substances</li>
          <li>Intoxication by alcohol or drugs</li>
          <li>Any conduct deemed to endanger the safety or well-being of other visitors or staff</li>
        </ul>
        <p>Removal from the event does not entitle the visitor to a refund.</p>
      </section>

      <section>
        <h2>8. Cancellation due to Force Majeure and Adverse Weather</h2>
        <h3>8.1 Force Majeure</h3>
        <p>The Organization is not liable for any damages caused by cancellation, postponement, or modification of the event due to force majeure. Force majeure includes, but is not limited to: natural disasters, extreme weather conditions (including KNMI Code Orange or Code Red warnings), fire, pandemics, government measures, public authority orders, safety risks, failure of utilities or infrastructure, and any other circumstance outside the reasonable control of the Organization.</p>
        <h3>8.2 Weather Policy (Outdoor Events)</h3>
        <p>As an outdoor event, ABNØRMAAL Events is subject to weather conditions. In the event of extreme or dangerous weather circumstances — including but not limited to heavy storms, lightning, extreme heat, or official weather warnings — the Organization reserves the right to:</p>
        <ul>
          <li>Temporarily suspend the event</li>
          <li>Modify the program, schedule, or layout</li>
          <li>Terminate the event early</li>
        </ul>
        <p>None of the above actions entitle visitors to a refund or compensation. The Organization may, at its sole discretion, offer an alternative date or partial voucher, but is under no obligation to do so.</p>
        <h3>8.3 Emergency Procedures</h3>
        <p>In the event of an emergency requiring evacuation or early termination of the event, visitors are required to follow the instructions of Organization staff, security personnel, and emergency services without delay. The Organization is not liable for any inconvenience or costs arising from such situations.</p>
      </section>

      <section>
        <h2>9. Liability of the Organization</h2>
        <p>The Organization is not liable for:</p>
        <ul>
          <li>Damage, loss, or theft of personal belongings on or around the event premises</li>
          <li>Personal injury caused by third parties or by the visitor's own actions</li>
          <li>Hearing damage resulting from the sound levels at the event (see also Article 18)</li>
          <li>Any consequential, indirect, or incidental damages</li>
        </ul>
        <p>Attendance at the event is entirely at the visitor's own risk. Liability is only accepted in cases of gross negligence or wilful misconduct on the part of the Organization. The Organization maintains event liability insurance (Aansprakelijkheidsverzekering Bedrijven). Any remaining liability of the Organization is limited to the face value of the ticket purchased.</p>
      </section>

      <section>
        <h2>10. Security Check &amp; Search</h2>
        <p>Upon entry, all visitors are subject to a security check and personal search. Visitors may request to be searched by a security officer of the same gender. Refusal to cooperate with a security check will result in denial of access without the right to a refund. Security personnel have the right to confiscate prohibited items (see Article 13).</p>
      </section>

      <section>
        <h2>11. Zero-Tolerance Drugs Policy</h2>
        <p>A strict zero-tolerance policy applies to the possession, use, or trade of illegal drugs on and around the event premises. Persons found to be in possession of, dealing in, or visibly under the influence of illegal drugs will be immediately removed from the event and may be reported to the relevant authorities. No refund will be issued.</p>
      </section>

      <section>
        <h2>12. Alcohol &amp; Entry under the Influence</h2>
        <p>It is prohibited to enter the event premises while visibly under the influence of alcohol or drugs. Visitors in such a condition will be denied entry without the right to a refund. The sale of alcohol is subject to Dutch licensing law; valid proof of age (18+) may be requested at any point of sale. The Organization reserves the right to refuse alcohol sales to any person.</p>
      </section>

      <section>
        <h2>13. Prohibited Items and Bag Policy</h2>
        <p>The following items are strictly prohibited on the event premises:</p>
        <ul>
          <li>Illegal drugs and drug paraphernalia</li>
          <li>Glassware of any kind</li>
          <li>Umbrellas</li>
          <li>Flags, banners, or flagpoles</li>
          <li>Sharp objects or weapons of any kind</li>
          <li>Face-covering masks (unless for medical or religious reasons with prior approval)</li>
          <li>Professional camera or recording equipment (without prior written approval)</li>
          <li>Own food or beverages (see Article 17)</li>
          <li>Bags larger than A4 size (exception: medical necessity with prior written approval)</li>
          <li>Any other items deemed dangerous or disruptive by security staff</li>
        </ul>
        <p>Prohibited items may be confiscated upon entry or at any point during the event. Confiscated items will not be returned. Visitors found in possession of prohibited items may be removed from the event without refund.</p>
      </section>

      <section>
        <h2>14. Photography, Videography &amp; Recording of Artists</h2>
        <h3>14.1 Visitor Consent</h3>
        <p>By attending the event, each visitor explicitly consents to being photographed, filmed, and/or recorded (audio and visual) during the event. This material may be used by the Organization for promotional, marketing, and archival purposes, without compensation to the visitor.</p>
        <h3>14.2 Restrictions on Recording Artists</h3>
        <p>Recording, filming, or photographing performing artists with professional equipment is strictly prohibited without the prior written consent of both the Organization and the artist or their management. This applies to cameras with interchangeable lenses, video cameras, drones, and any other professional recording devices. Violation of this provision may result in immediate removal from the event and potential legal consequences under applicable copyright and personality rights law.</p>
        <h3>14.3 Consumer Devices</h3>
        <p>Personal mobile phones and compact cameras may be used for personal, non-commercial purposes. The Organization reserves the right to restrict use of any recording device at any time.</p>
      </section>

      <section>
        <h2>15. Sound Levels &amp; Hearing Protection</h2>
        <p>This event operates at high sound pressure levels. The use of hearing protection is strongly advised. Hearing protection will be available for purchase or collection on site. The Organization is not liable for any hearing damage sustained as a result of attendance at the event. By attending, the visitor accepts the inherent risk of exposure to high sound levels.</p>
      </section>

      <section>
        <h2>16. Toilet Facilities &amp; Public Urination</h2>
        <p>Toilet facilities may only be used by one person at a time. Entry to toilet facilities with more than one person is not permitted and may result in removal from the event. Public urination on or around the event premises will result in immediate removal.</p>
      </section>

      <section>
        <h2>17. Smoking Policy</h2>
        <p>Smoking — including the use of e-cigarettes and vaping devices — is only permitted in designated smoking areas clearly marked on the event grounds. Smoking outside designated areas is prohibited and may result in removal from the event.</p>
      </section>

      <section>
        <h2>18. Food, Drinks &amp; Cup Deposit System</h2>
        <h3>18.1 No Outside Food or Drinks</h3>
        <p>Visitors may not bring their own food or drinks onto the event premises. All containers — even empty ones — are prohibited. Chewing gum and lollipops are prohibited due to sensitive ground surfaces. Sealed Smints and Dextro energy tablets are permitted.</p>
        <h3>18.2 Cup Deposit System</h3>
        <p>A reusable cup system is in operation at this event. When ordering a drink, visitors pay a deposit of €1.00 per cup. Cups can be returned at any drink station in exchange for a new cup with a drink. If a visitor orders multiple drinks simultaneously, a deposit of €1.00 applies per cup ordered at that moment. Returned cups are immediately reusable and no additional deposit is charged.</p>
        <p>Cups not returned at the end of the event will not be refunded. The Organization reserves the right to adjust this system for operational reasons.</p>
      </section>

      <section>
        <h2>19. Promotion and Commercial Activities</h2>
        <p>Promotional activities, flyer distribution, merchandise sales, and any other commercial activities are strictly prohibited on the event premises and in the direct surrounding area, without prior written permission from the Organization.</p>
      </section>

      <section>
        <h2>20. First Aid and Safety</h2>
        <p>A staffed First Aid station is present on site throughout the event. In the event of a medical emergency, visitors must immediately alert First Aid staff or security personnel. The Organization is not liable for any injury or medical incident, except in cases of gross negligence.</p>
        <p>Visitors with known medical conditions or allergies are advised to carry appropriate medication and inform First Aid staff upon arrival. A dedicated accessible viewing area and accessible facilities may be available; visitors requiring such provisions are invited to contact the Organization in advance via <a href="mailto:info@abnormaal-events.nl">info@abnormaal-events.nl</a>.</p>
      </section>

      <section>
        <h2>21. Data Protection</h2>
        <p>Personal data of visitors is processed by the Organization in accordance with the General Data Protection Regulation (GDPR) and applicable Dutch data protection legislation. Data is used exclusively for the purpose of event management, ticket administration, and (where consent has been given) marketing communications. For full details, please refer to the separate <a href="privacy.html">Privacy Policy</a>, available at <a href="https://www.abnormaal-events.nl">www.abnormaal-events.nl</a>.</p>
      </section>

      <section>
        <h2>22. Applicable Law and Jurisdiction</h2>
        <p>These Terms &amp; Conditions are governed exclusively by Dutch law (Nederlands recht). Any disputes arising from or in connection with these terms or the event will be submitted exclusively to the competent court in the Netherlands (Rechtbank Gelderland).</p>
      </section>

      <section>
        <h2>23. Reference to House Rules</h2>
        <p>These Terms &amp; Conditions are supplemented by the House Rules of ABNØRMAAL Events, which contain detailed provisions regarding safety, conduct, and other on-site regulations. The House Rules are available on the official website at <a href="https://www.abnormaal-events.nl">www.abnormaal-events.nl</a> and will be displayed on-site. In the event of any conflict between these Terms &amp; Conditions and the House Rules, these Terms &amp; Conditions shall prevail.</p>
      </section>
    </div>

);
