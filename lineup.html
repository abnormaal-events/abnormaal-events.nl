<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Line-up · Abnørmaal Festival 2026</title>
<link rel="stylesheet" href="site.css?v=69">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-accent="ochre" data-casing="mixed" data-squid="surgical" data-marquee="on">
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="subpage.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="site-tweaks.jsx"></script>

<script type="text/babel">
const LineupHero = () =>
  <section className="lineup-hero">
    <div className="hero-bg"></div>
    <div className="shell lineup-hero-inner">
      <h1 className="lineup-tba-mark">
        <span>To Be</span>
        <em>Announced</em>
      </h1>
      <p className="lineup-tba-sub">Two stages — <em>House</em> &amp; <em>Techno</em>. Names drop on the date below.</p>
      <Countdown target="2026-05-22T12:00:00+02:00" label="Line-up reveal in" />
      <div className="lineup-cta">
        <a href="tickets.html" className="hero-btn hero-btn--primary">
          <span className="hero-btn-glow" aria-hidden="true"></span>
          <span className="hero-btn-inner">
            <span>Pre-register</span>
            <svg width="16" height="16" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M3 11L11 3M11 3H4.5M11 3V9.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="square" /></svg>
          </span>
        </a>
        <span className="lineup-cta-note">Get the link 24 hours before public sale.</span>
      </div>
    </div>
    <div className="hero-chain"></div>
  </section>;

const App = () => (
  <div data-screen-label="Line-up page">
    <Nav />
    <LineupHero />
    <Marquee />
    <Footer />
    <SiteTweaks />
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
